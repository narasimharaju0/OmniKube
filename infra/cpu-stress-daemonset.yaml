apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: omnikube-cpu-stress
  labels:
    app: cpu-stress
spec:
  selector:
    matchLabels:
      app: cpu-stress
  template:
    metadata:
      labels:
        app: cpu-stress
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: cpu-stress
          image: alpine:latest
          resources:
            requests:
              cpu: 500m
              memory: 32Mi
            limits:
              cpu: 1000m
              memory: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[CPU Stress] Starting multi-core burn on $(hostname)"
              i=0
              while true; do
                i=$((i + 1))
                echo "stresstest-$i" | md5sum >/dev/null &
                echo "stresstest-$i" | md5sum >/dev/null &
                wait
              done
