{{- if .Values.mockHighCpu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnikube.fullname" . }}-mock-high-cpu
  labels:
    {{- include "omnikube.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-high-cpu
    app: mock-high-cpu
spec:
  replicas: {{ .Values.mockHighCpu.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnikube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mock-high-cpu
      app: mock-high-cpu
  template:
    metadata:
      labels:
        {{- include "omnikube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mock-high-cpu
        app: mock-high-cpu
        omnikube.io/scrape: "true"
    spec:
      containers:
        - name: mock-metrics
          image: {{ include "omnikube.mockHighCpu.image" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.mockHighCpu.metricsPort }}
          command: ["python", "-u", "-c"]
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer

              CPU = "{{ .Values.mockHighCpu.mockCpuPercent }}"
              MEMORY = "{{ .Values.mockHighCpu.mockMemoryPercent }}"
              PORT = {{ .Values.mockHighCpu.metricsPort }}

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path != "/metrics":
                          self.send_error(404)
                          return
                      body = f"CPU: {CPU}%\nMemory: {MEMORY}%\n".encode()
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain; charset=utf-8")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def log_message(self, format, *args):
                      return

              print(f"[MockHighCPU] Serving CPU: {CPU}% on :{PORT}/metrics")
              HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
{{- end }}
