apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnikube-mock-high-cpu
  labels:
    app: mock-high-cpu
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mock-high-cpu
  template:
    metadata:
      labels:
        app: mock-high-cpu
        omnikube.io/scrape: "true"
    spec:
      containers:
        - name: mock-metrics
          image: python:3.11-alpine
          ports:
            - containerPort: 8080
          command: ["python", "-u", "-c"]
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path != "/metrics":
                          self.send_error(404)
                          return
                      body = b"CPU: 92%\nMemory: 55%\n"
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain; charset=utf-8")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def log_message(self, format, *args):
                      return

              print("[MockHighCPU] Serving CPU: 92% on :8080/metrics")
              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
