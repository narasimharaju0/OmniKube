<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | OmniKube CloudMetrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 30% -10%, rgba(139, 92, 246, 0.35), transparent 50%),
        radial-gradient(ellipse 60% 50% at 90% 20%, rgba(59, 130, 246, 0.25), transparent 45%),
        linear-gradient(180deg, #0f0720 0%, #020617 100%);
    }
    .glass-card {
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgb(30 41 59);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 24px 64px rgba(0,0,0,0.45);
    }
    .brand-btn {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.4);
    }
    .brand-btn:hover { filter: brightness(1.06); }
  </style>
</head>
<body class="min-h-screen text-slate-100 antialiased flex flex-col">
  <header class="p-6 flex items-center justify-between max-w-lg mx-auto w-full">
    <a href="/" class="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Back to home
    </a>
    <a href="/auth/login?return_to=/dashboard" class="text-sm font-semibold text-violet-300 hover:text-violet-200 transition">Enterprise SSO</a>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pb-16">
    <div class="glass-card w-full max-w-md rounded-2xl p-8">
      <div class="text-center mb-8">
        <div class="mx-auto mb-4 h-12 w-12 rounded-xl brand-btn flex items-center justify-center text-lg font-bold text-white">OK</div>
        <p class="text-xs uppercase tracking-[0.35em] text-violet-300/80 font-semibold">OmniKube CloudMetrics</p>
        <h1 class="text-2xl font-bold mt-3 text-white tracking-tight">Sign in to continue</h1>
        <p class="text-sm text-slate-400 mt-2">Multi-tenant RBAC — role-based dashboard access</p>
      </div>
      <form id="login-form" class="space-y-4">
        <div>
          <label for="login-username" class="block text-sm text-slate-300 mb-1.5 font-medium">Username</label>
          <input id="login-username" type="text" autocomplete="username" required
            class="w-full rounded-xl bg-slate-950/70 border border-slate-700 px-4 py-2.5 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500"
            placeholder="admin_user" />
        </div>
        <div>
          <label for="login-password" class="block text-sm text-slate-300 mb-1.5 font-medium">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required
            class="w-full rounded-xl bg-slate-950/70 border border-slate-700 px-4 py-2.5 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500"
            placeholder="changeme" />
        </div>
        <p id="login-error" class="text-sm text-red-300 min-h-[1.25rem]"></p>
        <button type="submit" id="login-submit-btn" class="brand-btn w-full rounded-xl py-2.5 text-sm font-bold text-white transition">Sign In</button>
        <a href="/auth/login?return_to=/dashboard" class="mt-3 flex items-center justify-center gap-2 w-full rounded-xl py-2.5 text-sm font-semibold text-center text-violet-200 border border-violet-500/30 bg-violet-500/10 hover:bg-violet-500/20 transition">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Sign in with Enterprise SSO
        </a>
      </form>
      <div class="mt-6 rounded-xl border border-slate-800 bg-slate-950/40 p-4 text-xs text-slate-400 space-y-1">
        <p class="text-slate-300 font-semibold mb-2">Mock test accounts (password: <span class="text-violet-200">changeme</span>)</p>
        <p><span class="text-violet-200">admin_user</span> — Admin</p>
        <p><span class="text-cyan-200">editor_user</span> — Editor</p>
        <p><span class="text-amber-200">viewer_user</span> — Viewer</p>
      </div>
    </div>
  </main>

  <script>
    const AUTH_LOGIN_URL = "/api/v1/auth/login";
    const SESSION_TOKEN_KEY = "omnikube_session_token";
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get("return_to") || "/dashboard";

    function setSessionToken(token) {
      if (token) sessionStorage.setItem(SESSION_TOKEN_KEY, token);
    }

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const errorEl = document.getElementById("login-error");
      const submitBtn = document.getElementById("login-submit-btn");
      errorEl.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        const response = await fetch(AUTH_LOGIN_URL, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("login-username").value.trim(),
            password: document.getElementById("login-password").value
          })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || "Invalid credentials.");
        }
        if (payload.token) setSessionToken(payload.token);
        window.location.href = returnTo.startsWith("/") ? returnTo : "/dashboard";
      } catch (error) {
        errorEl.textContent = error.message || "Login failed.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
